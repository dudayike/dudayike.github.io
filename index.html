  <script>
    // 更新时间显示函数 (保持不变)
    function updateTimeDisplay() {
      const updateTimeElement = document.getElementById('update-time');
      if (!updateTimeElement) return;
      
      const now = new Date();
      const yesterday = new Date(now);
      yesterday.setDate(now.getDate() - 1);
      yesterday.setHours(12, 10, 0, 0);
      
      const year = yesterday.getFullYear();
      const month = String(yesterday.getMonth() + 1).padStart(2, '0');
      const day = String(yesterday.getDate()).padStart(2, '0');
      const hours = String(yesterday.getHours()).padStart(2, '0');
      const minutes = String(yesterday.getMinutes()).padStart(2, '0');
      
      updateTimeElement.textContent = `最后更新：${year}年${month}月${day}日 ${hours}:${minutes}`;
    }

        tags: ["社区", "讨论", "热门"],

        title: "黑料视频",
        description: "黑料视频资源站，高清视频在线观看",
        tags: ["视频", "在线", "高清"],

        tags: ["搜索", "查找", "快捷"],
        url: "go4.html"

    ];
    
    const backupLinks = [
      {
        id: 5,
        title: "备用站点一",
        description: "黑料网备用站点，主站无法访问时使用",
        tags: ["备用", "稳定"],
        url: "go5.html"
      },
      {
        id: 6,
        title: "备用站点二",
        description: "黑料网镜像站点，访问速度快",
        tags: ["镜像", "快速"],
        url: "go6.html"
      },
      {
        id: 7,
        title: "备用站点三",
        description: "黑料网备用入口，长期稳定运行",
        tags: ["长期", "稳定"],
        url: "go7.html"
      },
      {
        id: 8,
        title: "历史存档",
        description: "黑料历史内容存档站，查看过往资料",
        tags: ["历史", "存档"],
        url: "go8.html"
      }
    ];

    // 合并所有站点用于今日更新模块 (顺序: 先主要后备用)
    const allSites = [...primaryLinks, ...backupLinks];

    // 生成随机数 20-50
    function getRandomUpdateCount() {
      return Math.floor(Math.random() * 31) + 20; // 20~50  inclusive
    }

    // 生成主要/备用链接卡片 (原功能)
    function createLinkCard(link) {
      const card = document.createElement('div');
      card.className = 'link-card';
      
      const tagsHtml = link.tags.map(tag => `<span class="link-tag">${tag}</span>`).join('');
      
      card.innerHTML = `
        <div class="link-card-header">
          <div class="link-icon">${link.title.charAt(0)}</div>
          <div>
            <div class="link-title">${link.title}</div>
            <div class="link-desc">${link.description}</div>
          </div>
        </div>
        <div class="link-tags">${tagsHtml}</div>
        <a href="${link.url}" class="link-btn">立即访问</a>
      `;
      
      return card;
    }

    // 生成今日更新卡片 (每个站点一张，显示随机更新数)
    function createTodayUpdateCard(site, count) {
      const card = document.createElement('div');
      card.className = 'link-card';  // 复用卡片样式，但内部布局自定义
      
      // 自定义内部布局：左侧图标+标题，右侧醒目数字
      card.innerHTML = `
        <div style="display: flex; align-items: center; justify-content: space-between; height: 100%; width: 100%;">
          <div style="display: flex; align-items: center; min-width: 0; flex: 1;">
            <div class="link-icon" style="background: #ff9800; flex-shrink: 0;">${site.title.charAt(0)}</div>
            <div style="margin-left: 12px; overflow: hidden;">
              <div class="link-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${site.title}</div>
              <div class="link-desc" style="font-size:0.8rem;">今日更新</div>
            </div>
          </div>
          <div class="today-update-badge" style="flex-shrink: 0; background: #ff9800; color: white; border-radius: 30px; padding: 6px 16px; font-weight: bold; font-size: 1.2rem;">${count}篇</div>
        </div>
      `;
      
      return card;
    }

    // 渲染主要入口和备用入口
    function renderLinks() {
      const primaryContainer = document.getElementById('primary-links');
      const backupContainer = document.getElementById('backup-links');
      
      // 清空（防止重复）
      primaryContainer.innerHTML = '';
      backupContainer.innerHTML = '';
      
      primaryLinks.forEach(link => {
        primaryContainer.appendChild(createLinkCard(link));
      });
      
      backupLinks.forEach(link => {
        backupContainer.appendChild(createLinkCard(link));
      });
    }

    // 渲染今日更新模块 (每次刷新随机数)
    function renderTodayUpdates() {
      const container = document.getElementById('today-updates-grid');
      if (!container) return;
      
      container.innerHTML = ''; // 清空
      
      allSites.forEach(site => {
        const randomCount = getRandomUpdateCount();
        container.appendChild(createTodayUpdateCard(site, randomCount));
      });
    }

    // 模拟访问量更新
    function updateVisitCount() {
      const countElement = document.getElementById('visit-count');
      let count = parseInt(countElement.textContent.replace(/,/g, ''));
      setInterval(() => {
        count += Math.floor(Math.random() * 10) + 1;
        countElement.textContent = count.toLocaleString();
      }, 10000);
    }
    
    // 搜索功能
    function setupSearch() {
      const searchInput = document.querySelector('.search-input');
      const searchBtn = document.querySelector('.search-btn');
      
      const performSearch = () => {
        const query = searchInput.value.trim();
        if (query) {
          alert(`搜索: ${query}\n此功能为演示，实际需连接后端搜索服务`);
        }
      };
      
      searchBtn.addEventListener('click', performSearch);
      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          performSearch();
        }
      });
    }
    
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', () => {
      updateTimeDisplay();         // 更新时间
      renderLinks();               // 渲染主要/备用入口
      renderTodayUpdates();        // 渲染今日更新模块 (随机20-50)
      setupSearch();               // 搜索
      updateVisitCount();          // 访问量模拟
      
      // 添加一些交互效果 (仅用于原有卡片，今日更新卡片也可受益)
      const cards = document.querySelectorAll('.link-card');
      cards.forEach(card => {
        card.addEventListener('mouseenter', function() {
          this.style.zIndex = '10';
        });
        
        card.addEventListener('mouseleave', function() {
          this.style.zIndex = '1';
        });
      });
    });
  </script>
